<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koki Mzboot Zbta</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to bottom, #0d1b2a, #1b263b);
  color: white;
  text-align: center;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

.header img {
  width: 70px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px gold); }
  to { filter: drop-shadow(0 0 20px gold); }
}

h1 {
  color: gold;
}

.subtitle {
  color: #ffd166;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.item {
  background: #1e2a38;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

button {
  background: gold;
  color: black;
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-top: 5px;
}

#cart {
  margin-top: 20px;
  background: #14213d;
  padding: 15px;
  border-radius: 15px;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/2935/2935290.png">
  
  <div>
    <h1>🍗 Koki Mzboot Zbta</h1>
    <div class="subtitle">🌙 رمضان كريم | 🎉 عيد سعيد</div>
  </div>

  <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
</div>

<div class="menu">

<div class="item">
  <h3>Grilled Chicken</h3>
  <p>120 EGP</p>
  <button onclick="addToCart('Grilled Chicken',120)">Add</button>
</div>

<div class="item">
  <h3>Burger</h3>
  <p>80 EGP</p>
  <button onclick="addToCart('Burger',80)">Add</button>
</div>

<div class="item">
  <h3>Pizza</h3>
  <p>100 EGP</p>
  <button onclick="addToCart('Pizza',100)">Add</button>
</div>

<div class="item">
  <h3>Kids Meal + Toy</h3>
  <p>3000 EGP</p>
  <button onclick="addToCart('Kids Meal + Toy',3000)">Add</button>
</div>

<div class="item">
  <h3>Kids Meal + Book</h3>
  <p>200 EGP</p>
  <button onclick="addToCart('Kids Meal + Book',200)">Add</button>
</div>

<div class="item">
  <h3>Egg</h3>
  <p>100 EGP</p>
  <button onclick="addToCart('Egg',100)">Add</button>
</div>

</div>

<div id="cart">
  <h2>🛒 Cart</h2>
  <ul id="cartItems"></ul>
  <h3>Total: <span id="total">0</span> EGP</h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let total = 0;

function addToCart(item, price){
  total += price;

  let li = document.createElement("li");
  li.innerText = item + " - " + price + " EGP";
  document.getElementById("cartItems").appendChild(li);

  document.getElementById("total").innerText = total;
}

function checkout(){
  alert("✅ Order placed! Total = " + total + " EGP");
}
</script>

</body>
</html>
