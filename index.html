<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koki Mzboot Zbta v3</title>

<style>
body {
  font-family: Arial;
  background: #fff8e1;
  text-align: center;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}

.header img {
  width: 60px;
}

h1 {
  color: #e65100;
}

.subtitle {
  color: #2e7d32;
  font-size: 18px;
}

.menu {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.item {
  width: 90%;
  background: white;
  margin: 8px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

button {
  background: #ff9800;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-top: 5px;
}

#cart {
  margin: 20px;
  background: #ffe0b2;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/2935/2935290.png">
  
  <div>
    <h1>🍗 Koki Mzboot Zbta</h1>
    <div class="subtitle">🌙 رمضان كريم | 🎉 عيد سعيد</div>
  </div>

  <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
</div>

<div class="menu">

<div class="item">
  <h3>Grilled Chicken</h3>
  <p>120 EGP</p>
  <button onclick="addToCart('Grilled Chicken',120)">Add</button>
</div>

<div class="item">
  <h3>Burger</h3>
  <p>80 EGP</p>
  <button onclick="addToCart('Burger',80)">Add</button>
</div>

<div class="item">
  <h3>Pizza</h3>
  <p>100 EGP</p>
  <button onclick="addToCart('Pizza',100)">Add</button>
</div>

<div class="item">
  <h3>Kids Meal + Toy</h3>
  <p>3000 EGP</p>
  <button onclick="addToCart('Kids Meal + Toy',3000)">Add</button>
</div>

<div class="item">
  <h3>Kids Meal + Book</h3>
  <p>200 EGP</p>
  <button onclick="addToCart('Kids Meal + Book',200)">Add</button>
</div>

<div class="item">
  <h3>Egg</h3>
  <p>100 EGP</p>
  <button onclick="addToCart('Egg',100)">Add</button>
</div>

</div>

<div id="cart">
  <h2>🛒 Cart</h2>
  <ul id="cartItems"></ul>
  <h3>Total: <span id="total">0</span> EGP</h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let total = 0;

function addToCart(item, price){
  total += price;

  let li = document.createElement("li");
  li.innerText = item + " - " + price + " EGP";
  document.getElementById("cartItems").appendChild(li);

  document.getElementById("total").innerText = total;
}

function checkout(){
  alert("✅ Order placed! Total = " + total + " EGP");
}
</script>

</body>
</html>
